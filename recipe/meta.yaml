{% set python_min = "3.12" %}
{% set name = "pygeoapi" %}
{% set version = "0.23.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pygeoapi-{{ version }}.tar.gz
  sha256: 2ed1cb814d52676304d79bfa84b2aa61e20107ea1e1ac009babf113710380086

build:
  entry_points:
    - pygeoapi=pygeoapi:cli
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - babel ==2.10.3
    - click ==8.1.6
    - filelock ==3.25.0
    - flask ==3.1.3
    - jinja2 ==3.1.2
    - jsonschema ==4.26.0
    - pydantic ==1.10.14
    - pygeofilter ==0.3.3
    - pygeoif ==1.6.0
    - pyproj ==3.6.1
    - python-dateutil ==2.8.2
    - pytz ==2026.1.post1
    - pyyaml ==6.0.1
    - rasterio ==1.3.9
    - requests ==2.31.0
    - shapely ==2.0.3
    - sqlalchemy ==2.0.48
    - tinydb ==3.15.2

test:
  files:
    - local.config.yml
  commands:
    - pip check
    - export PYGEOAPI_CONFIG=local.config.yml
    - pygeoapi --help
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://pygeoapi.io
  license: MIT
  license_family: MIT
  license_file: LICENSE.md
  summary: pygeoapi provides an API to geospatial data

extra:
  recipe-maintainers:
    - tomkralidis
    - ocefpaf
    - DManowitz
